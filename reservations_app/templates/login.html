<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Réservations VP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a18;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: #2C2C2A;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 12px;
    }
    .logo h1 { font-size: 18px; font-weight: 700; color: #1a1a18; letter-spacing: -0.3px; }
    .logo p  { font-size: 13px; color: #888; margin-top: 3px; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      font-size: 15px;
      color: #1a1a18;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .field input:focus { border-color: #2C2C2A; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #2C2C2A;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
      -webkit-appearance: none;
    }
    .btn-primary:active { background: #444; }

    .error-msg {
      background: #fff0ee;
      border: 1px solid #f5c2b8;
      color: #c0392b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🏠</div>
      <h1>Villa Plaisance</h1>
      <p>Gestion des réservations</p>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="field">
        <label>Identifiant</label>
        <input type="text" name="username" autocomplete="username"
               autocapitalize="none" autofocus required>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary">Continuer →</button>
    </form>
  </div>
</body>
</html>
