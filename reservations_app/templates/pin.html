<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code PIN — Réservations VP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a18;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: #2C2C2A;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 12px;
    }
    .logo h1 { font-size: 18px; font-weight: 700; color: #1a1a18; }
    .logo p  { font-size: 13px; color: #888; margin-top: 3px; }

    .step-label {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 20px;
    }

    .error-msg {
      background: #fff0ee;
      border: 1px solid #f5c2b8;
      color: #c0392b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 18px;
      text-align: center;
    }

    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 0 0 28px;
    }
    .pin-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #e5e5e5;
      transition: background 0.15s;
    }
    .pin-dot.filled { background: #2C2C2A; }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 260px;
      margin: 0 auto;
    }
    .numpad-btn {
      padding: 18px;
      background: #f5f5f3;
      border: none;
      border-radius: 12px;
      font-size: 22px;
      font-weight: 500;
      color: #1a1a18;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-appearance: none;
      user-select: none;
    }
    .numpad-btn:active { background: #e0e0de; }
    .numpad-btn.del { font-size: 18px; color: #666; }
    .numpad-btn.ok {
      background: #2C2C2A;
      color: white;
      font-size: 15px;
      font-weight: 700;
    }
    .numpad-btn.ok:active { background: #444; }
    .numpad-empty { background: transparent !important; pointer-events: none; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #aaa;
      text-decoration: none;
    }
    .back-link:hover { color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <h1>Code PIN</h1>
      <p>Étape 2 sur 2</p>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" id="pin-form">
      <input type="hidden" name="pin" id="pin-value">

      <div class="pin-dots">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
      </div>

      <div class="numpad">
        {% for n in [1,2,3,4,5,6,7,8,9] %}
        <button type="button" class="numpad-btn" onclick="pinPress('{{ n }}')">{{ n }}</button>
        {% endfor %}
        <button type="button" class="numpad-btn del" onclick="pinDel()">⌫</button>
        <button type="button" class="numpad-btn" onclick="pinPress('0')">0</button>
        <button type="button" class="numpad-btn ok" id="btn-ok" onclick="pinSubmit()" disabled>OK</button>
      </div>
    </form>

    <a href="{{ url_for('login') }}" class="back-link">← Recommencer</a>
  </div>

  <script>
    let pinDigits = [];

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        document.getElementById('d' + i).classList.toggle('filled', i < pinDigits.length);
      }
      document.getElementById('btn-ok').disabled = pinDigits.length < 4;
    }

    function pinPress(n) {
      if (pinDigits.length < 4) {
        pinDigits.push(n);
        updateDots();
        if (pinDigits.length === 4) pinSubmit();
      }
    }

    function pinDel() {
      pinDigits.pop();
      updateDots();
    }

    function pinSubmit() {
      if (pinDigits.length !== 4) return;
      document.getElementById('pin-value').value = pinDigits.join('');
      document.getElementById('pin-form').submit();
    }
  </script>
</body>
</html>
